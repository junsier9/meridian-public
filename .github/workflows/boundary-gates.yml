name: Boundary Gates

on:
  push:
  pull_request:

jobs:
  # The full Windows boundary gate (scripts/verify/run_boundary_gates.py) is run
  # directly on the operator host, where the environment is controlled. It is
  # intentionally NOT run on GitHub-hosted windows-latest runners: several boundary
  # tests are wall-clock/async-timing sensitive (live receive-gap watchdogs) and
  # rely on the host's path semantics, so they flake on shared cloud runners. The
  # cloud CI below keeps the deterministic linux contract gates.

  static-contracts:
    name: static-contracts (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Static Contracts
        run: |
          python -m unittest tests.test_document_contracts tests.test_static_contracts tests.test_evidence_contracts tests.test_scheduled_task_contracts tests.test_binance_http

  quant-research-core:
    name: quant-research-core (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Quant Research Core Tests
        run: |
          python -m unittest tests.test_quant_research_core tests.test_quant_shadow_proposals tests.test_quant_universe_input_producer tests.test_feature_admission tests.test_quant_data_readiness tests.test_quant_runtime_contracts

  dependency-contract:
    name: dependency-contract (linux clean install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Dependency Contract
        run: |
          python scripts/verify/run_dependency_contract.py
