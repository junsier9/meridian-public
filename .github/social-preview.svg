<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="0.55" stop-color="#101A33"/>
      <stop offset="1" stop-color="#0B1226"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#CBE6FF"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#1E3A8A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#2A3658" stroke-width="1" opacity="0.22">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- decorative price chart motif -->
  <g opacity="0.9">
    <path d="M0 560 L120 540 L210 565 L300 500 L390 520 L480 470 L560 495 L660 430 L760 455 L860 395 L960 420 L1060 360 L1160 380 L1280 330 L1280 640 L0 640 Z" fill="url(#area)"/>
    <path d="M0 560 L120 540 L210 565 L300 500 L390 520 L480 470 L560 495 L660 430 L760 455 L860 395 L960 420 L1060 360 L1160 380 L1280 330" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <!-- candlesticks -->
  <g stroke-width="6" opacity="0.85">
    <g stroke="#34D399"><line x1="980" y1="250" x2="980" y2="330"/><rect x="971" y="270" width="18" height="44" fill="#34D399"/></g>
    <g stroke="#34D399"><line x1="1040" y1="220" x2="1040" y2="300"/><rect x="1031" y="240" width="18" height="40" fill="#34D399"/></g>
    <g stroke="#F87171"><line x1="1100" y1="240" x2="1100" y2="330"/><rect x="1091" y="260" width="18" height="50" fill="#F87171"/></g>
    <g stroke="#34D399"><line x1="1160" y1="200" x2="1160" y2="290"/><rect x="1151" y="220" width="18" height="46" fill="#34D399"/></g>
  </g>

  <!-- eyebrow with dot separators -->
  <rect x="80" y="92" width="54" height="6" rx="3" fill="url(#accent)"/>
  <g font-size="22" font-weight="600" letter-spacing="3" fill="#7DD3FC">
    <text x="148" y="100">QUANT</text>
    <circle cx="248" cy="93" r="3" fill="#38BDF8"/>
    <text x="266" y="100">ALPHA</text>
    <circle cx="356" cy="93" r="3" fill="#38BDF8"/>
    <text x="374" y="100">GOVERNANCE</text>
  </g>

  <!-- title -->
  <text x="78" y="232" fill="url(#title)" font-size="92" font-weight="800" letter-spacing="-1">Meridian Alpha</text>
  <text x="78" y="330" fill="url(#title)" font-size="92" font-weight="800" letter-spacing="-1">Platform</text>

  <!-- tagline -->
  <text x="80" y="392" fill="#9FB3D1" font-size="30" font-weight="500">Governed agent execution and systematic crypto alpha research</text>
  <text x="80" y="430" fill="#7C8FB0" font-size="24">Fail-closed, contract-pinned, evidence-driven. Built for Binance USD-M perpetuals.</text>

  <!-- feature chips: rounded pill + accent dot + label (no emoji) -->
  <g font-size="22" font-weight="600">
    <g>
      <rect x="80" y="470" width="230" height="50" rx="25" fill="#0EA5E91F" stroke="#38BDF8" stroke-opacity="0.45"/>
      <circle cx="108" cy="495" r="6" fill="#38BDF8"/>
      <text x="124" y="503" fill="#CDE9FF">Fail-closed gates</text>
    </g>
    <g>
      <rect x="326" y="470" width="232" height="50" rx="25" fill="#0EA5E91F" stroke="#38BDF8" stroke-opacity="0.45"/>
      <circle cx="354" cy="495" r="6" fill="#34D399"/>
      <text x="370" y="503" fill="#CDE9FF">12-factor frontier</text>
    </g>
    <g>
      <rect x="574" y="470" width="222" height="50" rx="25" fill="#0EA5E91F" stroke="#38BDF8" stroke-opacity="0.45"/>
      <circle cx="602" cy="495" r="6" fill="#22D3EE"/>
      <text x="618" y="503" fill="#CDE9FF">Agent framework</text>
    </g>
    <g>
      <rect x="812" y="470" width="210" height="50" rx="25" fill="#0EA5E91F" stroke="#38BDF8" stroke-opacity="0.45"/>
      <circle cx="840" cy="495" r="6" fill="#34D399"/>
      <text x="856" y="503" fill="#CDE9FF">Contract-tested</text>
    </g>
  </g>

  <!-- footer badges with circle separators -->
  <g font-size="22" font-weight="600">
    <text x="80" y="582" fill="#7C8FB0">Python 3.13</text>
    <circle cx="222" cy="575" r="3" fill="#475569"/>
    <text x="240" y="582" fill="#7C8FB0">MIT License</text>
    <circle cx="378" cy="575" r="3" fill="#475569"/>
    <text x="396" y="582" fill="#34D399">CI passing</text>
  </g>
  <text x="1200" y="582" fill="#5C6B86" font-size="22" text-anchor="end">github.com/junsier9/meridian-public</text>
</svg>
