strategy:
  label: v5_binance_pit_top_mid_h10d_pruned3_hv_balanced_soft_budget
  frozen_config_path: config/quant_research/binance_pit_top_mid_h10d_pruned3_hv_balanced_soft_budget.json
  frozen_config_sha256: 9867437bc74733d46f1a4292c84bbdf4f09c6c49f4862a0616d95ebc43f31938
  rebalance_interval_days: 10

binance:
  venue: usdm_futures
  base_url_env: ENHENGCLAW_BINANCE_USDM_BASE_URL
  api_key_env: Trade
  api_secret_env: Secret_Key
  recv_window_ms: 5000
  position_mode: one_way
  margin_type: cross
  max_leverage: 2
  auto_prepare_planned_symbol_settings: true

capital:
  sizing_basis: total_wallet_balance_usdt_x_2
  target_margin_safety_buffer_usdt: 300.0
  target_operating_buffer_usdt: 50.0
  allocated_capital_usdt: 3000.0
  max_gross_leverage: 2.0
  dynamic_risk_caps_from_resolved_capital: true
  max_symbol_weight_cap: 0.35
  max_order_weight_cap: 0.35
  max_symbol_notional_usdt: 600.0
  max_order_notional_usdt: 600.0

capital_topup:
  enabled: true
  mode: dynamic_primary_wallet_balance_minus_target_safety_buffer_x_2_entry_all_or_none_gate
  target_margin_safety_buffer_usdt: 300.0
  target_operating_buffer_usdt: 50.0
  min_additional_allocated_capital_usdt: 25.0
  require_balanced_all_or_none: true
  allow_dust_residual_noop_in_all_or_none: true
  enforce_all_or_none_for_dynamic_entries: true
  dynamic_risk_caps_from_resolved_capital: true
  max_symbol_weight_cap: 0.35
  max_order_weight_cap: 0.35
  allowed_delta_classifications: increase_same_side,new_entry,dust_residual,no_delta
  live_execution_enabled: true

capital_deployment:
  enabled: true
  mode: deploy_only_free_surplus_above_margin_buffer
  margin_safety_buffer_usdt: 300.0
  min_deployable_surplus_usdt: 50.0
  max_deploy_fraction_of_surplus: 0.95
  defer_if_post_plan_available_below_buffer: true
  defer_if_all_or_none_has_dust_leg: false
  defer_if_all_or_none_incomplete_entry: false
  defer_status: entry_second_all_or_none_deferred_for_margin_or_dust

risk:
  trading_enabled: false
  require_manual_live_confirm: true
  max_allocated_capital_usdt: 3000.0
  max_gross_notional_usdt: 3000.0
  max_symbol_notional_usdt: 600.0
  max_order_notional_usdt: 600.0
  # No daily realized-PnL / loss breaker by owner decision (2026-06-09): strategy
  # carries its own embedded risk limits; removed_daily_realized_pnl_gate is a
  # permanent no-op, so any max_daily_realized_loss_* / require_daily_pnl_gate_active
  # field is dead config (zero readers) and misleading. Do not re-add.
  min_available_balance_after_plan_usdt: 100.0
  min_available_balance_ratio_after_plan: 0.05
  min_margin_cushion_after_plan_usdt: 100.0
  max_spread_bps: 20
  max_market_data_age_seconds: 300
  max_account_snapshot_age_seconds: 30
  max_heartbeat_age_seconds: 900
  allow_new_shorts: true
  reduce_only_on_gate_failure: true

market_data:
  public_data_enabled: true
  symbols: BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT,XRPUSDT,DOGEUSDT,ADAUSDT,AVAXUSDT,LINKUSDT,LTCUSDT,BCHUSDT,TRXUSDT,DOTUSDT,UNIUSDT,AAVEUSDT,NEARUSDT,FILUSDT,ETCUSDT,APTUSDT,ARBUSDT
  daily_limit: 140
  four_hour_limit: 840

core_loop:
  mode: account_reconcile_multiphase_dynamic_capital_delta_risk_execution_reconcile
  target_engine: multiphase_equal_sleeve
  target_as_of: latest_closed_rebalance_slot
  capital_topup_after_static_noop: false
  max_cycles_per_invocation: 1
  interval_seconds: 0
  live_delta_enabled: true
  allow_multiphase_live_delta: true
  submit_orders: true
  auto_confirm_delta_after_preflight: true
  allowed_execution_stages: reduce_first,entry_second
  max_live_delta_order_count_per_cycle: 11
  live_delta_order_cap_policy:
    mode: target_leg_aware
    hard_max_order_count: 20
    reduce_first_extra_stale_exit_allowance: 5
    entry_second_cap_basis: target_position_count
    reduce_first_cap_basis: max_current_or_target_position_count
  min_seconds_between_live_delta_executions: 300
  fast_follow_entry_second_enabled: true
  fast_follow_entry_second_min_delay_seconds: 60
  fast_follow_entry_second_max_age_seconds: 180
  min_clean_cycles_before_live_delta: 3
  require_post_trade_reconcile: true
  require_data_freshness_gate: true
  # require_daily_pnl_gate_active removed (2026-06-09 owner decision): no daily-loss
  # gate exists in code; the field had zero readers and implied a non-existent breaker.
  require_margin_cushion_gate: true
  kill_switch_source: sqlite_operator_state

mainnet_live_supervisor:
  mode: sqlite_armed_multiphase_dynamic_capital_core_loop_timer
  target_engine: multiphase_equal_sleeve
  max_cycles_per_invocation: 1
  interval_seconds: 0
  allow_live_delta_when_armed: false
  allow_multiphase_live_delta: false
  capital_topup_enabled: false
  live_delta_armed_default: false
  recover_stale_heartbeats: true
  disarm_on_blocker: true
  require_core_loop_stage_policy: true
  recommended_timer_minutes: 10
  fast_follow_entry_second_enabled: true
  fast_follow_entry_second_delay_seconds: 90
  fast_follow_max_chain_invocations: 3
  fast_follow_policy:
    mode: reconcile_aware
    entry_after_reduce_delay_seconds: 20
    residual_reduce_delay_seconds: 30
    min_delay_seconds: 10
    max_delay_seconds: 90
    max_chain_invocations_hard_cap: 4
  repo_root: /root/meridian_alpha_live_runner/repo
  env_wrapper: /root/meridian_alpha_live_runner/bin/with-live-env
  python_path: /root/meridian_alpha_live_runner/venv/bin/python
  supervisor_script: scripts/live_trading/run_hv_balanced_mainnet_live_supervisor.py

mainnet_health_monitor:
  mode: artifact_sqlite_timer_health
  recent_run_count: 1
  max_seconds_since_latest_supervisor_run: 1200
  max_running_heartbeat_age_seconds: 900
  require_systemd_timer_active: true
  systemd_timer_name: meridian-alpha-mainnet-supervisor-live.timer
  no_order_expected: true
  disarm_on_alert: true
  auto_rearm_live_delta: false
  auto_rearm_requires_live_capable_timer: true
  auto_rearm_required_clean_supervisor_runs: 3
  auto_rearm_min_seconds_since_disarm: 1800
  auto_rearm_blocked_alert_codes: heartbeat_residue,live_delta_armed_during_noorder_timer,live_delta_execution_requested,live_order_fill_count_mismatch,live_order_or_fill_without_authorization,open_orders_present,orphan_paper_fills_present,orphan_paper_orders_present,supervisor_order_or_fill_nonzero
  auto_rearm_blocked_blocker_fragments: heartbeat_residue,open_orders,order_or_fill,position_drift,pnl_breach,unauthorized,unknown_status
  exit_code_on_alert: 2
  telegram_bot_token_env: TELEGRAM_BOT_TOKEN
  telegram_chat_id_env: TELEGRAM_CHAT_ID

state:
  sqlite_path: artifacts/live_trading/hv_balanced_binance_usdm_live_2x_full_balance_candidate/state/live_trading.sqlite3
  artifact_root: artifacts/live_trading/hv_balanced_binance_usdm_live_2x_full_balance_candidate/runs
